
<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Demande de devis</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
  <style>
body {
  margin: 0;
  font-family: Arial;
}

.container {
  width: 100%;
  min-height: 100vh;
  padding: 30px;
  box-sizing: border-box;
  background: white;
}

input, select, textarea {
  width: 100%;
  padding: 15px;
  margin-bottom: 12px;
  font-size: 16px;
  border-radius: 6px;
  border: 1px solid #ccc;
}

button {
  width: 100%;
  padding: 18px;
  font-size: 18px;
  background: #FFD700;
  border: none;
  font-weight: bold;
  border-radius: 8px;
}
</style>
<style>
  body {
    margin: 0;
    padding: 0;
    font-family: Arial, sans-serif;
    background: #f5f5f5;
  }

  .container {
    width: 100%;
    min-height: 100vh;
    background: white;
    padding: 20px;
    box-sizing: border-box;
  }
</style>
<body style="font-family: Arial; padding: 20px;">

<h2 style="text-align:center;">Recevez vos devis gratuits</h2>
<div class="container">
 <form action="https://formsubmit.co/arela.artisan@gmail.com" method="POST">
  <input type="hidden" name="_captcha" value="false">
<input type="hidden" name="_subject" value="Nuevo cliente AREBATOP"> 

<input type="text" name="nom" placeholder="Nom" required><br><br>

<input type="email" name="email" placeholder="Email" required><br><br>

<input type="tel" name="telephone" placeholder="Téléphone" required><br><br>

<select name="service" required>
<option value="">Type de service</option>
<option>Plomberie</option>
<option>Électricité</option>
<option>Rénovation</option>
</select><br><br>

<input type="text" name="ville" placeholder="Ville" required><br><br>

<textarea name="message" placeholder="Décrivez votre besoin" required></textarea><br><br>

<button type="submit">Recevoir mes devis</button>
 
</form>
</div>
</body>
</html>
