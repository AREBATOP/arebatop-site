<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Demande de devis</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body style="font-family: Arial; background:#f5f5f5; padding:20px;">

<h2 style="text-align:center;">Recevez vos devis gratuits</h2>

<form action="https://formspree.io/f/mojkrdrg" method="POST" style="max-width:400px;margin:auto;background:white;padding:20px;border-radius:10px;">

<input type="text" name="nom" placeholder="Nom" required style="width:100%;margin-bottom:10px;padding:10px;">
<input type="email" name="email" placeholder="Email" required style="width:100%;margin-bottom:10px;padding:10px;">
<input type="tel" name="telephone" placeholder="Téléphone" required style="width:100%;margin-bottom:10px;padding:10px;">

<select name="service" required style="width:100%;margin-bottom:10px;padding:10px;">
<option value="">Type de service</option>
<option>Plomberie</option>
<option>Électricité</option>
<option>Rénovation</option>
</select>

<input type="text" name="ville" placeholder="Ville" required style="width:100%;margin-bottom:10px;padding:10px;">

<textarea name="message" placeholder="Décrivez votre besoin" required style="width:100%;margin-bottom:10px;padding:10px;"></textarea>

<button type="submit" style="width:100%;background:#007BFF;color:white;padding:12px;border:none;border-radius:5px;">
Recevoir mes devis
</button>

</form>

</body>
</html>
