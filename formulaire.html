
<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Demande de devis</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body style="font-family: Arial; padding: 20px;">

<h2 style="text-align:center;">Recevez vos devis gratuits</h2>

<form action="https://formspree.io/f/mojkrdng" method="POST">

<input type="text" name="nom" placeholder="Nom" required><br><br>

<input type="email" name="email" placeholder="Email" required><br><br>

<input type="tel" name="telephone" placeholder="Téléphone" required><br><br>

<select name="service" required>
<option value="">Type de service</option>
<option>Plomberie</option>
<option>Électricité</option>
<option>Rénovation</option>
</select><br><br>

<input type="text" name="ville" placeholder="Ville" required><br><br>

<textarea name="message" placeholder="Décrivez votre besoin" required></textarea><br><br>

<button type="submit">Recevoir mes devis</button>

</form>

</body>
</html>
